  - Schema: elements/index.md
  - Background:
    - Overview: background/index.md
    - NEXUS: background/nexus.md
    - mmCIF: background/mmcif.md
    - EMPIAR: background/empiar.md
    - EMDB: background/emdb.md
    - DIALS: background/dials.md
    - SASDB: background/sasdb.md
    - REMBI: background/rembi-alignment.md
    - Data Lakehouse Strategy: background/lambda-ber-schema-data-lakehouse-strategy.md
    - Integration with BER: background/ber-doe-facilities.md
    - Data Quality Challenges: background/data-quality-challenges.md
  - Examples:
    - Simple Scattering GluRS Dataset: examples/simplescattering-glurs-analysis.md
  - Use Cases:
    - Overview: use-cases/index.html
    - Federated Data Pull: use-cases/01-federated-data-pull.html
    - Ask Your Data: use-cases/02-ask-your-data.html
    - Auto-Orchestrate Processing: use-cases/03-auto-orchestrate-processing.html
    - Cross-Source Integration: use-cases/04-cross-source-integration.html
    - Bundle, Deposit, and Query: use-cases/05-bundle-deposit-lakehouse.html
    - Reanalysis Triggers: use-cases/06-reanalysis-triggers.html
  - Technical:
    - Mapping to OME: technical/ome-mapping.md
  - Slides:
