---
site_name: "lambda-ber-schema"
theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: light)'
      primary: amber
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: amber
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - content.tabs.link
plugins:
  - search
  - mermaid2
nav:
