# ISPyB to lambda-ber-schema Field Mappings
# Source: https://github.com/DiamondLightSource/ispyb-database
#
# This file defines bidirectional mappings between ISPyB MySQL tables
# and lambda-ber-schema LinkML classes.

version: "1.0"
source_schema: ispyb
target_schema: lambda-ber-schema

# Class-level mappings
class_mappings:

  # Session/Study level
  - ispyb_table: BLSession
    lambda_ber_class: Study
    notes: "Beamline visit session maps to Study"

  - ispyb_table: Proposal
    lambda_ber_class: Dataset
    notes: "Proposal/project maps to Dataset container"

  # Sample hierarchy
  - ispyb_table: Protein
    lambda_ber_class: ProteinConstruct
    notes: "Protein metadata"

  - ispyb_table: Crystal
    lambda_ber_class: Sample
    notes: "Crystal with crystallographic parameters"

  - ispyb_table: BLSample
    lambda_ber_class: Sample
    notes: "Physical sample on beamline"

  # Data collection
  - ispyb_table: DataCollection
    lambda_ber_class: ExperimentRun
    notes: "Core data collection record"

  - ispyb_table: Detector
    lambda_ber_class: Instrument
    notes: "Detector as part of instrument; could be separate class"

  # Processing
  - ispyb_table: AutoProcProgram
    lambda_ber_class: WorkflowRun
    notes: "Processing program execution"

  - ispyb_table: AutoProcScalingStatistics
    lambda_ber_class: WorkflowRun
    notes: "Scaling statistics embedded in WorkflowRun"

  # BioSAXS - Macromolecules and Assemblies
  - ispyb_table: Macromolecule
    lambda_ber_class: MolecularComposition
    notes: "SAXS macromolecule metadata (name, sequence, MW)"

  - ispyb_table: Assembly
    lambda_ber_class: Sample
    notes: "Multi-component assembly maps to Sample with oligomeric_state"

  - ispyb_table: Stoichiometry
    lambda_ber_class: Sample
    notes: "Assembly stoichiometry encoded in Sample.oligomeric_state"

  # BioSAXS - Buffers
  - ispyb_table: Buffer
    lambda_ber_class: BufferComposition
    notes: "SAXS buffer composition"

  - ispyb_table: Additive
    lambda_ber_class: BufferComposition
    notes: "Buffer additives map to BufferComposition.additives list"

  # BioSAXS - Experiment and Data Collections
  - ispyb_table: Experiment
    lambda_ber_class: ExperimentRun
    notes: "SAXS experiment session"

  - ispyb_table: SaxsDataCollection
    lambda_ber_class: ExperimentRun
    notes: "SAXS data collection maps to ExperimentRun with technique=saxs"

  - ispyb_table: Specimen
    lambda_ber_class: Sample
    notes: "Specimen at point of measurement (concentration, volume)"

  - ispyb_table: Measurement
    lambda_ber_class: ExperimentRun
    notes: "Individual SAXS measurement (buffer-sample-buffer triplet)"

  # BioSAXS - Primary Data Processing
  - ispyb_table: Subtraction
    lambda_ber_class: WorkflowRun
    notes: "Buffer subtraction step; workflow_type=saxs_analysis"

  - ispyb_table: Merge
    lambda_ber_class: WorkflowRun
    notes: "Frame merging step; workflow_type=saxs_analysis"

  - ispyb_table: Run
    lambda_ber_class: ExperimentRun
    notes: "SAXS run containing multiple frames"

  - ispyb_table: Frame
    lambda_ber_class: DataFile
    notes: "Individual SAXS frame as a data file"

  # BioSAXS - Ab Initio Modeling
  - ispyb_table: AbInitioModel
    lambda_ber_class: WorkflowRun
    notes: "Ab initio shape reconstruction; workflow_type=saxs_analysis"

  - ispyb_table: Model
    lambda_ber_class: DataFile
    notes: "Model output file (e.g., .pdb from DAMMIF/DAMMIN)"

  # BioSAXS - Sample Plates (logistics)
  - ispyb_table: SamplePlate
    lambda_ber_class: null
    notes: "No equivalent yet - logistics/container tracking (TODO)"

  - ispyb_table: SamplePlatePosition
    lambda_ber_class: null
    notes: "No equivalent yet - well position on plate (TODO)"

  - ispyb_table: StockSolution
    lambda_ber_class: SamplePreparation
    notes: "Partial mapping - stock solution prep details"

# Field-level mappings for DataCollection -> ExperimentRun
field_mappings:

  DataCollection_to_ExperimentRun:
    - ispyb: dataCollectionId
      lambda_ber: ispyb_data_collection_id
      transform: null

    - ispyb: wavelength
      lambda_ber: wavelength
      transform: null
      notes: "Wavelength in Angstroms"

    - ispyb: detectorDistance
      lambda_ber: detector_distance
      transform: null
      notes: "Sample-detector distance in mm"

    - ispyb: numberOfImages
      lambda_ber: number_of_images
      transform: null

    - ispyb: axisStart
      lambda_ber: start_angle
      transform: null
      notes: "Starting rotation angle in degrees"

    - ispyb: axisRange
      lambda_ber: oscillation_angle
      transform: null
      notes: "Oscillation range per image in degrees"

    - ispyb: xBeam
      lambda_ber: beam_center_x
      transform: null
      notes: "Beam center X in mm"

    - ispyb: yBeam
      lambda_ber: beam_center_y
      transform: null
      notes: "Beam center Y in mm"

    - ispyb: resolution
      lambda_ber: resolution
      transform: null
      notes: "Resolution at detector edge in Angstroms"

    - ispyb: resolutionAtCorner
      lambda_ber: resolution_at_corner
      transform: null

    - ispyb: exposureTime
      lambda_ber: exposure_time
      transform: null
      notes: "Exposure time per image in seconds"

    - ispyb: transmission
      lambda_ber: transmission
      transform: null
      notes: "Beam transmission 0-100%"

    - ispyb: flux
      lambda_ber: flux
      transform: null
      notes: "Photon flux in photons/second"

    - ispyb: flux_end
      lambda_ber: flux_end
      transform: null

    - ispyb: slitGapHorizontal
      lambda_ber: slit_gap_horizontal
      transform: null
      notes: "Horizontal slit aperture in micrometers"

    - ispyb: slitGapVertical
      lambda_ber: slit_gap_vertical
      transform: null

    - ispyb: undulatorGap1
      lambda_ber: undulator_gap
      transform: null
      notes: "Undulator gap in mm"

    - ispyb: synchrotronMode
      lambda_ber: synchrotron_mode
      transform: null

    - ispyb: startTime
      lambda_ber: start_time
      transform: datetime_to_string

    - ispyb: endTime
      lambda_ber: end_time
      transform: datetime_to_string

  AutoProcScalingStatistics_to_WorkflowRun:
    - ispyb: autoProcScalingStatisticsId
      lambda_ber: ispyb_auto_proc_scaling_id
      transform: null

    - ispyb: resolutionLimitLow
      lambda_ber: resolution_low
      transform: null

    - ispyb: resolutionLimitHigh
      lambda_ber: resolution_high
      transform: null

    - ispyb: rMerge
      lambda_ber: rmerge
      transform: null
      notes: "R-merge value"

    - ispyb: rPim
      lambda_ber: rpim
      transform: null
      notes: "R-pim value"

    - ispyb: completeness
      lambda_ber: completeness_percent
      transform: null

    - ispyb: multiplicity
      lambda_ber: multiplicity
      transform: null

    - ispyb: meanIOverSigI
      lambda_ber: i_over_sigma
      transform: null
      notes: "Mean I/sigma(I)"

    - ispyb: ccHalf
      lambda_ber: cc_half
      transform: null
      notes: "CC1/2 correlation coefficient"

    - ispyb: anomalousCompleteness
      lambda_ber: anomalous_completeness
      transform: null

    - ispyb: anomalousMultiplicity
      lambda_ber: anomalous_multiplicity
      transform: null

    - ispyb: ccAno
      lambda_ber: cc_anomalous
      transform: null

    - ispyb: rAnom
      lambda_ber: r_anomalous
      transform: null

    - ispyb: sigAno
      lambda_ber: sig_anomalous
      transform: null

    - ispyb: nTotalObservations
      lambda_ber: n_total_observations
      transform: null

    - ispyb: nTotalUniqueObservations
      lambda_ber: n_total_unique
      transform: null

  # ===== BioSAXS Field Mappings =====

  Macromolecule_to_MolecularComposition:
    - ispyb: sequence
      lambda_ber: sequences
      transform: string_to_list
      notes: "Single sequence string to multivalued list"

    - ispyb: molecularMass
      lambda_ber: null
      transform: null
      notes: "Maps to Sample.molecular_weight (parent level, not MolecularComposition)"

  Buffer_to_BufferComposition:
    - ispyb: name
      lambda_ber: null
      transform: null
      notes: "No direct name field on BufferComposition"

    - ispyb: pH
      lambda_ber: ph
      transform: float_to_quantity_value
      notes: "Buffer pH"

    - ispyb: composition
      lambda_ber: components
      transform: string_to_list
      notes: "Comma-separated components to list"

  Additive_to_BufferComposition:
    - ispyb: name
      lambda_ber: additives
      transform: string_to_list
      notes: "Additive name appended to additives list"

    - ispyb: quantity
      lambda_ber: null
      transform: null
      notes: "Additive concentration - no structured equivalent yet"

  Specimen_to_Sample:
    - ispyb: concentration
      lambda_ber: concentration
      transform: float_to_quantity_value
      notes: "Sample concentration in mg/mL"

    - ispyb: volume
      lambda_ber: null
      transform: null
      notes: "Sample volume - no direct slot (TODO)"

  SaxsDataCollection_to_ExperimentRun:
    - ispyb: dataCollectionId
      lambda_ber: ispyb_data_collection_id
      transform: null
      notes: "Cross-reference to ISPyB SAXS data collection"

    - ispyb: exposureTime
      lambda_ber: exposure_time
      transform: null
      notes: "Exposure time per frame in seconds"

    - ispyb: numberOfFrames
      lambda_ber: number_of_images
      transform: null
      notes: "Number of SAXS frames maps to number_of_images"

  Subtraction_to_WorkflowRun:
    - ispyb: subtractionId
      lambda_ber: null
      transform: null
      notes: "ISPyB subtraction ID - no cross-ref slot yet"

    - ispyb: rg
      lambda_ber: null
      transform: null
      notes: "Radius of gyration from Guinier - no slot yet (TODO: SAXS metrics)"

    - ispyb: rgStdev
      lambda_ber: null
      transform: null
      notes: "Rg standard deviation"

    - ispyb: I0
      lambda_ber: null
      transform: null
      notes: "Forward scattering intensity I(0)"

    - ispyb: I0Stdev
      lambda_ber: null
      transform: null
      notes: "I(0) standard deviation"

    - ispyb: dmax
      lambda_ber: null
      transform: null
      notes: "Maximum particle dimension from P(r)"

    - ispyb: total
      lambda_ber: null
      transform: null
      notes: "Total scattered intensity"

    - ispyb: volume
      lambda_ber: null
      transform: null
      notes: "Porod volume estimate"

    - ispyb: quality
      lambda_ber: null
      transform: null
      notes: "Data quality indicator"

  AbInitioModel_to_WorkflowRun:
    - ispyb: averagedModelId
      lambda_ber: null
      transform: null
      notes: "Reference to averaged model (Model table)"

    - ispyb: rapidShapeDeterminationModelId
      lambda_ber: null
      transform: null
      notes: "Reference to rapid shape model (Model table)"

    - ispyb: shapeDeterminationModelId
      lambda_ber: null
      transform: null
      notes: "Reference to full shape model (Model table)"

    - ispyb: numberOfModels
      lambda_ber: null
      transform: null
      notes: "Number of models generated"

  BLSession_to_Study:
    - ispyb: sessionId
      lambda_ber: ispyb_session_id
      transform: null

    - ispyb: beamLineName
      lambda_ber: beamline
      transform: null

    - ispyb: startDate
      lambda_ber: start_date
      transform: datetime_to_string

    - ispyb: endDate
      lambda_ber: end_date
      transform: datetime_to_string

    - ispyb: comments
      lambda_ber: description
      transform: null

# Unmapped ISPyB tables (to be addressed)
unmapped_tables:
  # MX logistics
  - Shipping
  - Dewar
  - Container
  - RobotAction
  - GridInfo
  - DataCollectionGroup
  - PhasingStep
  - PhasingAnalysis
  - ModelBuilding
  # BioSAXS logistics/linking
  - SamplePlate
  - SamplePlatePosition
  - PlateGroup
  - PlateType
  - StockSolution
  - InstructionSet
  - Instruction
  # BioSAXS linking tables
  - AssemblyHasMacromolecule
  - MacromoleculeRegion
  - AssemblyRegion
  - BufferHasAdditive
  - MeasurementToDataCollection
  - SubtractionToAbInitioModel
  - ModelList
  - ModelToList
  - FrameList
  - FrameToList
  - FrameSet
  notes: "MX logistics and BioSAXS linking tables require new classes or extensions"

# BioSAXS field mapping gaps (require schema additions)
biosaxs_schema_gaps:
  - description: "SAXS-derived structural parameters (Rg, I0, Dmax, Porod volume)"
    ispyb_table: Subtraction
    proposal: "Add SAXS metrics to WorkflowRun or create SAXSAnalysisResult class"
  - description: "Sample volume at point of measurement"
    ispyb_table: Specimen
    proposal: "Add volume slot to Sample"
  - description: "Concentration series as structured data"
    ispyb_table: SaxsDataCollection
    proposal: "SAXSPreparation.concentration_series already exists but is single-valued"

# Transforms
transforms:
  datetime_to_string:
    description: "Convert MySQL DATETIME to ISO8601 string"
    python: "lambda x: x.isoformat() if x else None"

  string_to_list:
    description: "Wrap a single string value in a list"
    python: "lambda x: [x] if x else []"

  float_to_quantity_value:
    description: "Convert a float to a QuantityValue dict"
    python: "lambda x: {'numeric_value': x} if x is not None else None"
