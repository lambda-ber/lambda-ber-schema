    project:
      abstract: "Human PARP enzymes are a diverse class of medically relevant proteins\
        \ that regulate multiple aspects of biology. The major catalytic activity\
        \ of PARP enzymes is the production of ADP-ribose modifications on biomolecules\
        \ such as proteins, nucleic acids, and metabolites. Human PARP enzymes are\
        \ diverse and regulate distinct and varied biological pathways, many of which\
        \ are deregulated in common diseases. PARP enzymes that are implicated in\
        \ deregulated biological pathways have offered an avenue for therapeutic intervention,\
        \ with the \u201Cdruggable\u201D PARP active site targeted in several diseases,\
        \ most notably cancer, inflammation, and neurodegenerative disorders. The\
        \ proposed work will provide important knowledge regarding the structure and\
        \ regulation of human PARP enzymes and associated partner proteins."
