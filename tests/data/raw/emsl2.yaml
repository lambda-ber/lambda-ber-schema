    project:
      abstract: Fungal diseases claim over 1.5 million lives annually and affect more
        than a billion people worldwide, presenting a significant challenge due to
        increasing drug resistance. A primary mechanism underlying this resistance
        is drug efflux, mediated by the overexpression of ATP-binding cassette and
        major facilitator superfamily transporters. In this proposal, we aim to determine
        the structures of drug transporters in Candida species, human fungal pathogens,
        to gain molecular insights into substrate recognition and the various steps
        of the transport cycle. We have successfully expressed and purified the transporters
        of interest. Following optimization, we obtained high-resolution cryo-EM structures
        in the apo state for two of these transporters. Through this proposal, we
        seek support to collect cryo-EM data to resolve the structures of these transporters
        in complex with various substrates and antifungal drugs, and in different
        functional states throughout the transport cycle.
