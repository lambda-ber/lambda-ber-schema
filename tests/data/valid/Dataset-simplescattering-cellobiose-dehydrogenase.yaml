- id: simplescattering:xs33026i/sample
  title: Cellobiose Dehydrogenase (addition of divalent cations)
  description: The interdomain electron transfer between the catalytic flavodehydrogenase
    domain and the electron transferring cytochrome domain of cellobiose dehydrogenase
    plays an essential role in biocatalysis, biosensors, and biofuel cells as well
    as for its natural function as an auxiliary enzyme of lytic polysaccharide monooxygenase.
    We investigated the mobility of the cytochrome and dehydrogenase domain of cellobiose
    dehydrogenase (CDH), which are hypothesized to limit interdomain electron transfer
    in solution by small angle X-ray scattering (SAXS). CDH from Myriococcum thermophilum
    was used to study the CDH mobility in the presence of divalent cations. We showed
    that the presence of calcium ions decreases the mobility of the cytochrome domain.
  sample_code: SS-XS33026I
  sample_type: protein
