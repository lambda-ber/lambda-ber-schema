title: "Biological Small Angle Neutron Scattering (Bio-SANS) Instrument at HFIR"
name: "Bio-SANS"
id : "https://neutrons.ornl.gov/biosans"
instrument_code: "HFIR-CG3"
instrument_category: "NEUTRON_BEAMLINE"
facility_name: "High Flux Isotope Reactor"
facility_ror: "https://ror.org/02xn1ny06"
beamline_id: "CG-3"
manufacturer: "Oak Ridge National Laboratory"
model: "Bio-SANS"
installation_date: "2007-05-01"
current_status: "operational"
technique: "sans"
q_range_min : 0.0009 
q_range_max : 1.0 
detectors:
  - detector_name: "main_detector"
    detector_type: "He3 Linear Position Sensitive Detector"
    detector_description: "Main detector array for small-angle scattering"
    pixel_size_x: 5.5
    pixel_size_y: 4.3
    sample_detector_distance: 7.0
    detector_translation: 220
    rotation_angle: 0.0
    beam_trap_type: "y76semi"
    beam_trap_position_x: 84.0
    beam_trap_position_y: 557.0
  - detector_name: "midrange_dectector"
    detector_type: "Curved He3 Linear Position Sensitive Detector"
    detector_description: "midrange detector for the intermediate q-range between the main and wing detectors"
    pixel_size_x: 5.5
    pixel_size_y: 4.3
    sample_detector_distance: 3966.2
    rotation_angle: -2.7
  - detector_name: "wing_detector"
    detector_type: "Curved He3 Linear Position Sensitive Detector"
    detector_description: "West wing detector for capturing the high q-range"
    pixel_size_x: 5.5
    pixel_size_y: 4.3
    sample_detector_distance: 1129.538
    rotation_angle: 7.25
source:
  source_type: "neutron_reactor"
  source_description: "Cold neutron source with velocity selector"
  wavelength: 6.023
  wavelength_spread: 0.13
  wavelength_selection_method: "monochromator"
  energy: 0.0227 
  flux: 2e6 
configuration:
  q_min: 0.006
  q_max: 1.0
  number_of_guides: 4
  attenuator: "none"
  source_aperature_diameter: 40 
  sample_aperature_diameter: 10 
  sample_to_si : 59
  siwindow_to_main_distance: 6941
  sample_ap_to_si_distance: 82
  sample_ap_to_sample_distance: 23 
  source_ap_to_sample_ap_distance: 9709.6
environment:
  environment_name: "UR5e Robot Sample Changer"
  temperature: 298.0
  temperature_unit: "K"
  pressure: 1.0
  pressure_unit: "atm"