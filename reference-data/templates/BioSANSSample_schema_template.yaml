# ============================================================
# Sample Schema Template — all available fields
# Fields marked "# optional" may be null or omitted.
# ============================================================

# ------ Sample -----------------------------------------------
sample_id: "<unique_sample_identifier>"
sample_name: "<human-readable sample name>"
sample_description: "<free-text description>"          # optional
sample_uuid: "<auto-generated UUID>"                   # optional; auto-set by schema
date_prepared: "YYYY-MM-DDTHH:MM:SS"                  # optional
cell_type: "<e.g. quartz_cuvette>"
sample_volume: 0.0          # float, mL
sample_storage_temperature: 0.0   # float
temperature_unit: "Celsius"       # or K, F

contrast:                          # optional; list of floats
  - 0.0

# ------ Project ----------------------------------------------
project:
  project_id: "<project_id>"
  project_name: "<project name>"                       # optional
  project_description: "<project description>"         # optional

# ------ Preparation ------------------------------------------
preparation:
  method_description: "<sample preparation method>"   # optional

# ------ Molecules --------------------------------------------
# Each entry is a Molecule (or Protein subclass). Use is_a to
# indicate the subtype: "protein", "lipid", "nucleic_acid", or "molecule".
molecules:
  - is_a: "protein"
    long_name: "<full protein name>"
    short_name: "<abbreviated name>"                   # optional
    is_deuterated: false
    deuteration:                                       # optional; populate when is_deuterated: true
      level: 0.0                                       # fraction deuteration, 0-1
      method_description: "<deuteration method>"      # optional
      deuterated_carbon_source: "<carbon source>"     # optional
      deuterated_growth_medium: 0.0                   # % D2O in growth medium
    molecule_source: "<supplier or expression system>"
    molecule_description: "<description>"             # optional
    chemical_formula: "<empirical formula>"
    molecular_weight: 0.0                             # Da
    total_mw: null                                    # optional; total MW for complex
    sld: null                                         # optional; 10^-6 Å^-2
    sld_unit: null                                    # optional
    volume: null                                      # optional
    volume_unit: null                                 # optional
    density: null                                     # optional; g/cm^3
    density_unit: null                                # optional
    concentration_mg_per_ml: 0.0                      # optional if concentration_mM set
    concentration_mM: null                            # optional if concentration_mg_per_ml set
    # Protein-specific fields (only when is_a: protein)
    sequence: "<amino acid sequence, 1-letter codes>"
    sequence_length: null                             # optional; auto-computed by schema
    uniprot_code: "<UniProt accession>"
    uniprot_sequence: null                            # optional; canonical UniProt sequence
    uniprot_range_first: null                         # optional; start of UniProt range
    uniprot_range_last: null                          # optional; end of UniProt range
    organism: "<scientific name>"                     # optional
    oligomerization: "<monomer|dimer|...>"            # optional
    number_molecules: 1                               # optional
    seguid: "<seguid hash>"                           # auto-computed by schema
    plasmid_ID: null                                  # optional

# ------ Solvent ----------------------------------------------
solvent:
  name: "<solvent name>"
  ph: 7.0                         # 0–14
  solution_comp_desc: "<free text description>"       # optional
  d2o_fraction: 1.0               # optional; fraction D2O (0 < x < 1)
  sld: null                       # optional; 10^-6 Å^-2
  sld_unit: null                  # optional
  # Buffers — list of Molecule entries (see molecule fields above)
  buffers:
    - is_a: "molecule"
      long_name: "<buffer molecule name>"
      short_name: null                               # optional
      is_deuterated: false
      molecule_source: "<supplier>"
      molecule_description: null                    # optional
      chemical_formula: "<formula>"
      molecular_weight: 0.0
      concentration_mM: 0.0
  # Additives — list of Molecule entries
  additives:
    - is_a: "molecule"
      long_name: "<additive name>"
      short_name: null                              # optional
      is_deuterated: false
      molecule_source: "<supplier>"
      molecule_description: null                   # optional
      chemical_formula: "<formula>"
      molecular_weight: 0.0
      concentration_mM: 0.0

# ------ Experiments ------------------------------------------
experiments:
  - # ---- Instrument ----------------------------------------
    instrument:
      title: "Biological Small Angle Neutron Scattering (Bio-SANS) Instrument at HFIR"
      name: "Bio-SANS"
      id: "https://neutrons.ornl.gov/biosans"
      instrument_code: "HFIR-CG3"
      instrument_category: "NEUTRON_BEAMLINE"
      facility_name: "High Flux Isotope Reactor"
      facility_ror: "https://ror.org/02xn1ny06"       # optional
      beamline_id: "CG-3"
      manufacturer: "Oak Ridge National Laboratory"
      model: "Bio-SANS"
      installation_date: "2007-05-01"
      current_status: "operational"
      technique: "sans"
      description: ""                                  # optional
      q_range_min: 0.0009
      q_range_max: 1.0

      # ---- Detectors ---------------------------------------
      detectors:
        - detector_name: "main_detector"
          detector_type: "He3 Linear Position Sensitive Detector"
          detector_description: "Main detector array for small-angle scattering"
          pixel_size_x: 5.5        # mm
          pixel_size_y: 4.3        # mm
          sample_detector_distance: 7.0   # m
          detector_translation: 220.0    # optional; mm
          rotation_angle: 0.0            # optional; degrees
          beam_trap_type: "y76semi"       # optional
          beam_trap_position_x: 84.0      # optional; mm
          beam_trap_position_y: 557.0     # optional; mm
        - detector_name: "midrange_dectector"
          detector_type: "Curved He3 Linear Position Sensitive Detector"
          detector_description: "midrange detector for the intermediate q-range between the main and wing detectors"
          pixel_size_x: 5.5
          pixel_size_y: 4.3
          sample_detector_distance: 3966.2
          detector_translation: null    # optional
          rotation_angle: -2.7
          beam_trap_type: null          # optional
          beam_trap_position_x: null    # optional
          beam_trap_position_y: null    # optional
        - detector_name: "wing_detector"
          detector_type: "Curved He3 Linear Position Sensitive Detector"
          detector_description: "West wing detector for capturing the high q-range"
          pixel_size_x: 5.5
          pixel_size_y: 4.3
          sample_detector_distance: 1129.538
          detector_translation: null    # optional
          rotation_angle: 7.25
          beam_trap_type: null          # optional
          beam_trap_position_x: null    # optional
          beam_trap_position_y: null    # optional

      # ---- Source ------------------------------------------
      source:
        source_type: "neutron_reactor"
        source_description: "Cold neutron source with velocity selector"
        wavelength: 6.023            # Å
        wavelength_spread: 0.13      # Δλ/λ
        wavelength_selection_method: "monochromator"  # optional
        energy: 0.0227               # optional; eV
        flux: 2.0e6                  # optional; n/cm^2/s

      # ---- Configuration -----------------------------------
      configuration:
        q_min: 0.006
        q_max: 1.0
        number_of_guides: 4
        attenuator: "none"
        source_aperature_diameter: 40   # mm
        sample_aperature_diameter: 10   # mm
        sample_to_si: 59                # mm
        siwindow_to_main_distance: 6941 # mm
        sample_ap_to_si_distance: 82    # mm
        sample_ap_to_sample_distance: 23  # mm
        source_ap_to_sample_ap_distance: 9709.6  # mm

      # ---- Environment (URRobot) ---------------------------
      environment:
        environment_name: "UR5e Robot Sample Changer"
        environment_description: null   # optional
        num_sample_changers: 88         # optional
        sample_changer_type: "UR5e"
        sample_position: 1
        sample_cell_type: "quartz_cuvette"
        sample_cell_thickness: 1.0      # mm
        sample_temperature: 298.0
        temperature_unit: "K"
        sample_pressure: 1.0
        pressure_unit: "atm"

    # ---- Experiment-level fields ---------------------------
    date: "YYYY-MM-DDTHH:MM:SS"
    duration: 3600.0          # seconds
    total_counts: 1000000
    run_id: 0
    sample_type: "protein_solution"
    collection_type: "scattering"
    datafile_type: ".nxs.hdf5"   # optional; default .nxs.hdf5
    datafile_location: "/data/IPTS-XXXXX/CG3/<run_id>.nxs.hdf5"
    facility_id: "HFIR"

    # ---- drtSANS Reduction Workflow ------------------------
    workflow_reduction:
      name: "drtSANS Reduction Workflow"                               # optional; has default
      description: "A workflow for reducing SANS data using drtSANS"  # optional; has default
      documentation: "https://drtsans.readthedocs.io/latest/"
      code: "https://github.com/neutrons/drtsans"
      schema_stamp: "YYYY-MM-DDTHH:MM:SS"   # optional
      instrument_name: "Bio-SANS"            # optional
      ipts_number: "IPTS-XXXXX"              # optional
      data_directories: "/data/IPTS-XXXXX/CG3/"
      output_file_name: "<output_stem>"
      output_logfile_name: null              # optional

      sample:
        run_number: "0"
        name: null                           # optional
        description: null                    # optional
        data_type: null                      # optional
        file_extension: null                 # optional
        load_options: {}                     # optional; key-value overrides
        thickness: 1.0                       # cm
        transmission:
          run_number: "0"
          name: null                         # optional
          description: null                  # optional
          data_type: null                    # optional
          file_extension: null               # optional
          value: null                        # optional; override if measured
          error_tolerance: 0.01              # optional

      background:
        run_number: "0"
        name: null                           # optional
        description: null                    # optional
        data_type: null                      # optional
        file_extension: null                 # optional
        transmission:
          run_number: "0"
          name: null                         # optional
          description: null                  # optional
          data_type: null                    # optional
          file_extension: null               # optional
          value: null                        # optional
          error_tolerance: null              # optional

      empty_transmission:
        run_number: "0"
        name: null                           # optional
        description: null                    # optional
        data_type: null                      # optional
        file_extension: null                 # optional
        value: 1.0                           # optional

      beam_center:
        run_number: "0"
        name: null                           # optional
        description: null                    # optional
        data_type: null                      # optional
        file_extension: null                 # optional

      elastic_reference:                     # optional; null if not used
        run_number: null
        thickness: 1.0
        transmission:
          run_number: null
          value: null
          error_tolerance: null

      elastic_reference_bkgd:               # optional; null if not used
        run_number: null
        transmission:
          run_number: null
          value: null
          error_tolerance: null

      # ---- drtSANS Configuration --------------------------
      configuration:
        output_dir: "/output/IPTS-XXXXX/"
        wavelength: 6.0              # Å
        wavelength_spread: 0.1       # Δλ/λ
        sample_aperture_size: 10.0   # mm

        # --- Time / log slicing ---
        use_time_slice: false
        time_slice_interval: null    # optional
        time_slice_offset: 0.0       # optional
        time_slice_period: null      # optional
        use_time_slice_transmission: false
        use_log_slice: false
        log_slice_name: null         # optional
        log_slice_interval: null     # optional

        # --- Geometry overrides ---
        scale_components: null       # optional; dict
        sample_offset: null          # optional; mm
        sample_detector_distance: null  # optional; mm override
        sample_to_si: null           # optional; mm override
        source_aperture_diameter: null  # optional; mm override

        # --- Masking ---
        use_pixel_calibration: false
        remove_algorithm_history: false
        mask_file_name: null
        use_default_mask: true
        default_mask: null           # optional; list of dicts
        use_mask_back_tubes: false

        # --- Dark files ---
        dark_main_file_name: null    # optional
        dark_wing_file_name: null    # optional
        dark_midrange_file_name: null  # optional
        dark_file_name: null         # optional

        # --- Normalization ---
        normalization: "Monitor"
        normalization_resort_to_time: false

        # --- Sensitivity ---
        sensitivity_main_file_name: null    # optional
        sensitivity_wing_file_name: null    # optional
        sensitivity_midrange_file_name: null  # optional
        sensitivity_file_name: null         # optional

        # --- Corrections ---
        use_solid_angle_correction: true
        blocked_beam_run_number: null       # optional
        use_theta_dep_trans_correction: true
        db_scaling_beam_radius: null        # optional; mm
        mm_radius_for_transmission: null    # optional; mm

        # --- Absolute scale ---
        absolute_scale_method: "standard"
        standard_absolute_scale: 2.17e-10

        # --- Binning (2D) ---
        num_main_q_x_q_y_bins: null    # optional
        num_wing_q_x_q_y_bins: null    # optional
        num_midrange_q_x_q_y_bins: null  # optional
        num_q_x_q_y_bins: null         # optional

        # --- Binning (1D) ---
        d_q_bin_type: "wedge"
        q_bin_type: null               # optional
        num_main_q_bins: null          # optional
        num_wing_q_bins: null          # optional
        num_midrange_q_bins: null      # optional
        num_q_bins: null               # optional
        log_q_bins_per_decade_main: null    # optional
        log_q_bins_per_decade_wing: null    # optional
        log_q_bins_per_decade_midrange: null  # optional
        log_q_bins_per_decade: null         # optional
        use_log_q_bins_decade_center: false
        use_log_q_bins_even_decade: false

        # --- Wedge ---
        wedge_min_angles: null         # optional; list of ints
        wedge_max_angles: null         # optional; list of ints
        auto_wedge_q_min: 0.003
        auto_wedge_q_max: 0.04
        auto_wedge_q_delta: 0.01
        auto_wedge_azimuthal_delta: 1.0
        auto_wedge_peak_width: 0.25
        auto_wedge_background_width: 1.5
        auto_wedge_signal_to_noise_min: 2.0
        auto_wedge_peak_search_window_size_factor: 0.6
        annular_angle_bin: 1.0
        auto_wedge_phi_min: 90.0
        auto_wedge_phi_max: 270.0
        auto_symmetric_wedges: false

        # --- Q range per detector ---
        q_min_main: 0.02
        q_max_main: 0.125
        q_min_wing: 0.06
        q_max_wing: 1.0
        q_min_midrange: 0.06
        q_max_midrange: 1.0
        q_min: null                    # optional; global override
        q_max: null                    # optional; global override

        # --- Stitch ---
        overlap_stitch_ignore_midrange: false
        overlap_stitch_q_min: null     # optional
        overlap_stitch_q_max: null     # optional
        overlap_stitch_reference_detector: "main"

        # --- Wedge 1/2 Q ranges ---
        wedge1_q_min_main: null        # optional
        wedge1_q_max_main: null        # optional
        wedge1_q_min_wing: null        # optional
        wedge1_q_max_wing: null        # optional
        wedge1_q_min_midrange: null    # optional
        wedge1_q_max_midrange: null    # optional
        wedge1_overlap_stitch_q_min: null  # optional
        wedge1_overlap_stitch_q_max: null  # optional
        wedge2_q_min_main: null        # optional
        wedge2_q_max_main: null        # optional
        wedge2_q_min_wing: null        # optional
        wedge2_q_max_wing: null        # optional
        wedge2_q_min_midrange: null    # optional
        wedge2_q_max_midrange: null    # optional
        wedge2_overlap_stitch_q_min: null  # optional
        wedge2_overlap_stitch_q_max: null  # optional

        # --- Smearing / subpixels ---
        use_error_weighting: false
        smearing_pixel_size_x: null    # optional; mm
        smearing_pixel_size_y: null    # optional; mm
        use_subpixels: false
        subpixels_x: null              # optional
        subpixels_y: null              # optional

        # --- EQ-SANS specific ---
        instrument_configuration_dir: null     # optional
        cut_tof_min: 500.0
        cut_tof_max: 2000.0
        wavelength_step: 0.1
        wavelength_step_type: "constant Delta lambda"
        use_detector_offset: true
        detector_offset: null          # optional; m
        flux_monitor_ratio_file: null  # optional
        beam_flux_file_name: null      # optional
        use_slice_id_x_as_suffix: false
        fit_inelastic_incoh: false
        incohfit_intensity_weighted: false
        incohfit_q_min: null           # optional
        incohfit_q_max: null           # optional
        incohfit_factor: null          # optional
        output_wavelength_dependent_profile: false
        select_min_incoh: false
