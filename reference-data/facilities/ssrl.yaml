# Stanford Synchrotron Radiation Lightsource (SSRL) Beamline Reference Data
# SLAC National Accelerator Laboratory, Menlo Park, California, USA
#
# Facility Information:
#   Name: Stanford Synchrotron Radiation Lightsource
#   ROR: https://ror.org/05gzmn429
#   Energy: 3.0 GeV
#   Website: https://www-ssrl.slac.stanford.edu/
#
# The SMB (Structural Molecular Biology) program operates 7 dedicated beamlines:
# - 4 for macromolecular crystallography (MX)
# - 1 for SAXS/WAXS
# - 2 for XAS (X-ray absorption spectroscopy)
#
# Sources:
# - https://smb.slac.stanford.edu/
# - https://www-ssrl.slac.stanford.edu/smb-mc/content/beamlines
# - https://biosync.rcsb.org/synchrotronprofile.do?synch_id=ssrl

beamlines:
  # Macromolecular Crystallography Beamlines
  - id: lambdaber:beamline_ssrl_bl12_2
    title: "SSRL BL12-2"
    description: "Macromolecular crystallography beamline with microbeam capabilities and in-vacuum mini-gap undulator source optimized for MAD, SAD, and monochromatic data collection"
    instrument_code: "SSRL-BL12-2"
    instrument_category: SYNCHROTRON_BEAMLINE
    facility_name: SSRL
    facility_ror: "https://ror.org/05gzmn429"
    beamline_id: "BL12-2"
    techniques_supported:
      - xray_crystallography
    source_type: synchrotron
    energy_min: 6.69
    energy_max: 17.0
    current_status: operational

  - id: lambdaber:beamline_ssrl_bl12_1
    title: "SSRL BL12-1"
